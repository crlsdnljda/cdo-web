# ===========================================================================
# CDO Solutions — Compose para producción (EasyPanel).
# - Sin puertos expuestos (EasyPanel/Traefik enruta vía dominio).
# - Volúmenes nombrados para persistencia.
# - Tema cdo-solutions bind-mount desde el repo (deploys = git pull + restart).
# - Apache override montado para AllowOverride All (.htaccess).
# - WP_HOME / WP_SITEURL dinámicos según HTTP_HOST → funciona con cualquier
#   dominio sin reconfigurar.
# ===========================================================================

services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - cdo_db:/var/lib/mysql
    networks:
      - cdo_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: 0
      # IPs autorizadas a entrar a /wp-admin/ y /wp-login.php
      # (resto de visitantes → redirect 302 a la home)
      # Lista CSV, soporta IPs exactas o CIDR. Vacío = sin restricción.
      CDO_ADMIN_ALLOWED_IPS: ${CDO_ADMIN_ALLOWED_IPS:-}
      # Token secreto alternativo: si el proxy no pasa la IP real, accedes con
      # https://cdo.solutions/wp-admin/?cdo_key=<este_token>
      # → setea cookie de 1 año y a partir de ahí accedes normal.
      CDO_ADMIN_TOKEN: ${CDO_ADMIN_TOKEN:-}
      # Google Tag Manager — formato GTM-XXXXXXX. Vacío = no se carga.
      CDO_GTM_ID:      ${CDO_GTM_ID:-GTM-PHJ84V64}
      # Google reCAPTCHA v3 — keys desde https://www.google.com/recaptcha/admin
      # site key: pública (frontend). secret key: privada (verificación backend).
      # Vacíos = el captcha se desactiva (form sigue funcionando solo con honeypot).
      CDO_RECAPTCHA_SITE_KEY:   ${CDO_RECAPTCHA_SITE_KEY:-}
      CDO_RECAPTCHA_SECRET_KEY: ${CDO_RECAPTCHA_SECRET_KEY:-}
      # SMTP (Mailcow self-hosted) — wp_mail() saldrá por aquí si está configurado.
      # Si CDO_SMTP_HOST está vacío, WP usa el mail() nativo de PHP (no fiable).
      CDO_SMTP_HOST:       ${CDO_SMTP_HOST:-}
      CDO_SMTP_PORT:       ${CDO_SMTP_PORT:-465}
      CDO_SMTP_USER:       ${CDO_SMTP_USER:-}
      CDO_SMTP_PASS:       ${CDO_SMTP_PASS:-}
      CDO_SMTP_ENCRYPTION: ${CDO_SMTP_ENCRYPTION:-ssl}
      CDO_SMTP_FROM:       ${CDO_SMTP_FROM:-}
      CDO_SMTP_FROM_NAME:  ${CDO_SMTP_FROM_NAME:-CDO Solutions}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_DISPLAY', false );
        define( 'WP_DEBUG_LOG',     true );
        @ini_set( 'display_errors', 0 );
        error_reporting( E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED & ~E_STRICT );
        // Restricción de admin por IP — lista expuesta a PHP como constante
        define( 'CDO_ADMIN_ALLOWED_IPS',     getenv( 'CDO_ADMIN_ALLOWED_IPS' )     ?: '' );
        define( 'CDO_ADMIN_TOKEN',           getenv( 'CDO_ADMIN_TOKEN' )           ?: '' );
        define( 'CDO_GTM_ID',                getenv( 'CDO_GTM_ID' )                ?: '' );
        define( 'CDO_RECAPTCHA_SITE_KEY',    getenv( 'CDO_RECAPTCHA_SITE_KEY' )    ?: '' );
        define( 'CDO_RECAPTCHA_SECRET_KEY',  getenv( 'CDO_RECAPTCHA_SECRET_KEY' )  ?: '' );
        define( 'CDO_SMTP_HOST',             getenv( 'CDO_SMTP_HOST' )             ?: '' );
        define( 'CDO_SMTP_PORT',       (int) ( getenv( 'CDO_SMTP_PORT' )           ?: 465 ) );
        define( 'CDO_SMTP_USER',             getenv( 'CDO_SMTP_USER' )             ?: '' );
        define( 'CDO_SMTP_PASS',             getenv( 'CDO_SMTP_PASS' )             ?: '' );
        define( 'CDO_SMTP_ENCRYPTION',       getenv( 'CDO_SMTP_ENCRYPTION' )       ?: 'ssl' );
        define( 'CDO_SMTP_FROM',             getenv( 'CDO_SMTP_FROM' )             ?: '' );
        define( 'CDO_SMTP_FROM_NAME',        getenv( 'CDO_SMTP_FROM_NAME' )        ?: 'CDO Solutions' );
        // URLs dinámicas — funciona con cualquier dominio detrás de Traefik
        if ( ! defined( 'WP_HOME' ) && ! empty( $$_SERVER['HTTP_HOST'] ) ) {
            $$proto = ( ! empty( $$_SERVER['HTTPS'] ) && $$_SERVER['HTTPS'] !== 'off' ) ? 'https' : 'http';
            // Confiar en el header X-Forwarded-Proto que mete Traefik
            if ( ! empty( $$_SERVER['HTTP_X_FORWARDED_PROTO'] ) ) {
                $$proto = $$_SERVER['HTTP_X_FORWARDED_PROTO'];
            }
            define( 'WP_HOME',    $$proto . '://' . $$_SERVER['HTTP_HOST'] );
            define( 'WP_SITEURL', $$proto . '://' . $$_SERVER['HTTP_HOST'] );
        }
        // Confiar en proxies (Traefik) para HTTPS detection
        if ( ! empty( $$_SERVER['HTTP_X_FORWARDED_PROTO'] ) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
            $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - cdo_wp_data:/var/www/html
      # El tema vive en el repo — git pull + restart del servicio = deploy
      - ./wp-content/themes/cdo-solutions:/var/www/html/wp-content/themes/cdo-solutions:ro
      # AllowOverride All para que .htaccess (permalinks) funcione
      - ./apache-override.conf:/etc/apache2/conf-enabled/zz-cdo-overrides.conf:ro
      # Dump de la BD inicial accesible para importarlo en el primer deploy
      - ./db:/var/www/html/db:ro
    networks:
      - cdo_internal

volumes:
  cdo_db:
  cdo_wp_data:

networks:
  cdo_internal:
    driver: bridge
